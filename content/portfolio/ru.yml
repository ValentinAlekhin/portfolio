      title: MVP и SaaS-продукты
      description: Помогу превратить идею в работающий продукт с понятным объёмом первой версии, удобным интерфейсом, архитектурой и планом запуска.
      icon: launch
      details:
        - item: Требования и состав продукта
        - item: Интерфейс и архитектура
        - item: Frontend и backend
        - item: Подготовка к запуску
    - id: web-applications
      title: Веб-приложения
      description: Разрабатываю личные кабинеты, внутренние системы, редакторы, административные панели и сложные приложения с пользовательской логикой.
      icon: application
      details:
        - item: Личные кабинеты и панели
        - item: Внутренние и административные системы
        - item: Редакторы и сложные интерфейсы
        - item: Пользовательские сценарии
    - id: integrations-automation
      title: Интеграции и автоматизация
      description: Подключаю внешние API, платежи, CRM, авторизацию и уведомления, а повторяющиеся ручные процессы превращаю в надёжные сценарии.
      icon: integration
      details:
        - item: Внешние и внутренние API
        - item: Платежи и авторизация
        - item: CRM и уведомления
        - item: Автоматизация бизнес-процессов
