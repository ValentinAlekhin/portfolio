process:
  eyebrow: Сотрудничество
  title: Как проходит работа
  description: Прозрачный процесс из четырёх этапов помогает держать продуктовые решения, объём работ и прогресс в поле зрения — от первого разговора до запуска.
  items:
    - number: "01"
      title: Обсуждение
      description: Вы рассказываете о задаче, пользователях, текущем состоянии, необходимых функциях и ожидаемом результате.
      details:
        - item: Контекст продукта и пользователи
        - item: Текущий этап и ограничения
        - item: Необходимый результат
    - number: "02"
      title: Предложение
      description: Я уточняю требования, предлагаю техническое решение, определяю состав работ, сроки и подходящий формат оплаты.
      details:
        - item: Технический подход
        - item: Состав и приоритеты
        - item: Сроки и формат работы
    - number: "03"
      title: Разработка
      description: Работа идёт поэтапно с регулярными демонстрациями, поэтому вы видите прогресс и можете корректировать интерфейс до завершения.
      details:
        - item: Поэтапная реализация
        - item: Регулярные демонстрации
        - item: Ранняя обратная связь
    - number: "04"
      title: Запуск
      description: Я готовлю production-сборку, разворачиваю продукт, проверяю основные сценарии, исправляю проблемы запуска и передаю инструкции.
      details:
        - item: Подготовка production
        - item: Развёртывание и проверка
        - item: Передача и следующие шаги

about:
  eyebrow: Совместная работа
  title: Один разработчик вместо нескольких разрозненных исполнителей
  paragraphs:
    - text: Я специализируюсь на разработке веб-продуктов и могу самостоятельно отвечать за большую часть проекта — интерфейс, frontend, backend, интеграции и запуск.
    - text: Мне необязательно передавать полностью готовое техническое задание. Я могу помочь проработать идею, определить основные пользовательские сценарии и предложить практичные варианты реализации.
    - text: Интерфейс также не обязательно готовить заранее. Я могу собрать первый рабочий вариант, показать его в контексте продукта и улучшить в несколько итераций.
    - text: Общение ведётся напрямую, без дополнительного слоя менеджеров. Возможна работа с фиксированным объёмом проекта или почасовое подключение к развитию продукта.
  facts:
    - value: 6 лет
      label: в разработке
    - value: Full-stack
      label: frontend и backend
    - value: Напрямую
      label: общение без посредников
    - value: Гибко
      label: проектная или почасовая работа

