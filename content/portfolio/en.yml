process:
  eyebrow: Collaboration
  title: How the work is organized
  description: A transparent four-step process keeps product decisions, scope and progress visible from the first conversation to launch.
  items:
    - number: "01"
      title: Discussion
      description: You describe the task, its users, current state, required functions and the outcome you need.
      details:
        - item: Product context and users
        - item: Current stage and constraints
        - item: Required outcome
    - number: "02"
      title: Proposal
      description: I clarify the requirements, suggest a technical solution, define the scope and propose timing and payment format.
      details:
        - item: Technical approach
        - item: Scope and priorities
        - item: Timeline and work format
    - number: "03"
      title: Development
      description: Work moves in stages with regular demonstrations, so you can see progress and adjust the interface before completion.
      details:
        - item: Iterative implementation
        - item: Regular progress reviews
        - item: Early feedback
    - number: "04"
      title: Launch
      description: I prepare the production build, deploy it, verify core scenarios, resolve launch issues and hand over instructions.
      details:
        - item: Production preparation
        - item: Deployment and verification
        - item: Handover and next steps

about:
  eyebrow: Working together
  title: One developer instead of several disconnected contractors
  paragraphs:
    - text: I specialize in web products and can independently take responsibility for most of a project — interface, frontend, backend, integrations and launch.
    - text: You do not need to arrive with a fully prepared specification. We can shape the idea together, identify the main user scenarios and choose a practical implementation approach.
    - text: The interface does not have to be designed in advance either. I can prepare the first working version, show it in the product context and improve it over several iterations.
    - text: Communication is direct, without an extra management layer. I can work on a fixed project scope or join ongoing development on an hourly basis.
  facts:
    - value: 6 years
      label: in development
    - value: Full-stack
      label: frontend and backend
    - value: Direct
      label: communication
    - value: Flexible
      label: project-based or hourly work

